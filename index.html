<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stills By Rish</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
         :root {
            --bg: #0a0a0a;
            --bg2: #111;
            --bg3: #1a1a1a;
            --border: #222;
            --text: #e8e8e8;
            --muted: #666;
            --accent: #fff;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 15px;
            line-height: 1.6;
        }
        
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.4rem 3rem;
            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.95), transparent);
        }
        
        .nav-name {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            user-select: none;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        
        .nav-links a:hover {
            color: var(--accent);
        }
        
        #hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        .hero-title {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 300;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 1rem;
            position: relative;
            z-index: 2;
        }
        
        .hero-sub {
            font-size: 0.9rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 2.5rem;
            position: relative;
            z-index: 2;
        }
        
        .hero-cta {
            display: inline-block;
            padding: 0.7rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: all 0.25s;
            position: relative;
            z-index: 2;
        }
        
        .hero-cta:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        #featuredCarousel {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        
        .carousel-slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        
        .carousel-slide.active {
            opacity: 1;
        }
        
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }
        
        .carousel-dots {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            z-index: 3;
        }
        
        .carousel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: background 0.3s;
            border: none;
            padding: 0;
        }
        
        .carousel-dot.active {
            background: #fff;
        }
        
        #gallery {
            padding: 5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .section-label {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 2rem;
            text-align: center;
        }
        /* Filter buttons */
        
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: inherit;
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 0.5rem 1.4rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            border-color: #555;
            color: var(--text);
        }
        
        .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }
        /* Admin panel */
        
        .upload-zone {
            border: 1px dashed var(--border);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: border-color 0.2s, background 0.2s;
            border-radius: 2px;
        }
        
        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: #444;
            background: var(--bg2);
        }
        
        .upload-zone p {
            color: var(--muted);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }
        
        .upload-zone span {
            color: var(--accent);
        }
        
        #fileInput {
            display: none;
        }
        
        .admin-folders {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .folder-btn {
            flex: 1;
            min-width: 120px;
            padding: 0.65rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: inherit;
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .folder-btn.active,
        .folder-btn:hover {
            border-color: #555;
            color: var(--accent);
            background: var(--bg2);
        }
        
        .masonry {
            columns: 3;
            column-gap: 12px;
        }
        
        @media (max-width: 900px) {
            .masonry {
                columns: 2;
            }
        }
        
        @media (max-width: 500px) {
            .masonry {
                columns: 1;
            }
        }
        
        .photo-card {
            break-inside: avoid;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: var(--bg3);
        }
        
        .photo-card img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease, filter 0.4s ease;
            filter: brightness(0.92);
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }
        
        .photo-card:hover img {
            transform: scale(1.03);
            filter: brightness(0.6);
        }
        
        .photo-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .photo-card:hover .photo-overlay {
            opacity: 1;
        }
        
        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }
        
        .card-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--accent);
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.3rem 0.7rem;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }
        
        .card-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .card-btn.danger:hover {
            background: rgba(200, 60, 60, 0.4);
            border-color: rgba(200, 60, 60, 0.4);
        }
        
        .empty-state {
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            padding: 3rem 0;
        }
        
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        #lightbox.open {
            display: flex;
        }
        
        #lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            display: block;
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }
        
        .lb-caption {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: var(--muted);
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .lb-close {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .lb-close:hover {
            color: var(--accent);
        }
        
        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            font-size: 2rem;
            cursor: pointer;
            padding: 1rem;
            transition: color 0.2s;
        }
        
        .lb-nav:hover {
            color: var(--accent);
        }
        
        #lb-prev {
            left: 1rem;
        }
        
        #lb-next {
            right: 1rem;
        }
        
        #contact {
            max-width: 560px;
            margin: 0 auto;
            padding: 6rem 2rem;
            text-align: center;
        }
        
        #contact .section-label {
            margin-bottom: 2.5rem;
        }
        
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            text-align: left;
        }
        
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        
        .form-field label {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
        }
        
        .form-field input,
        .form-field textarea {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 0.875rem;
            outline: none;
            resize: none;
            transition: border-color 0.2s;
            border-radius: 2px;
        }
        
        .form-field input:focus,
        .form-field textarea:focus {
            border-color: #444;
        }
        
        .form-submit {
            margin-top: 0.5rem;
            padding: 0.85rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: inherit;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s;
        }
        
        .form-submit:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            border-top: 1px solid var(--border);
        }
        
        .overlay-box {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 1px solid #333;
            padding: 2rem;
            z-index: 999;
            text-align: center;
            min-width: 300px;
        }
        
        .overlay-box p.label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 1rem;
        }
        
        .overlay-box input {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #e8e8e8;
            padding: 0.6rem 1rem;
            font-family: inherit;
            font-size: 0.875rem;
            outline: none;
            width: 100%;
            margin-bottom: 0.75rem;
        }
        
        .overlay-box button.go {
            width: 100%;
            padding: 0.6rem;
            background: transparent;
            border: 1px solid #333;
            color: #666;
            font-family: inherit;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
        }
        
        .overlay-box button.go:hover {
            border-color: #fff;
            color: #fff;
        }
        
        .overlay-box .err {
            color: #c44;
            font-size: 0.7rem;
            margin-top: 0.6rem;
            display: none;
        }
        
        .upload-status {
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 1.5rem;
            min-height: 1.2em;
            text-align: center;
        }
        
        .upload-status.ok {
            color: #5a5;
        }
        
        .upload-status.fail {
            color: #c44;
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-name">Rishabh Patel</div>
        <div class="nav-links">
            <a href="#gallery">Work</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section id="hero">
        <div id="featuredCarousel"></div>

        <div class="carousel-dots" id="carouselDots"></div>
        <h1 class="hero-title">Stills By Rish</h1>
        <p class="hero-sub">Photography &nbsp;·&nbsp; Light &nbsp;·&nbsp; Moment</p>

    <div class="overlay-box" id="adminBox">
        <p class="label">Admin Access</p>
        <input type="password" id="adminPwInput" placeholder="Password">
        <input type="password" id="adminTokenInput" placeholder="GitHub Token">
        <button class="go" id="adminPwBtn">Enter</button>
        <p class="err" id="adminPwErr"></p>
    </div>

    <script>
        var GITHUB_USER = 'RPatel97';
        var GITHUB_REPO = 'RPatel97.github.io';
        var ADMIN_PASS_HASH = 'def52de1d6600afb4206e4d741de10ae038767f2dd9979cc1b815402ee9f1c6a';

        // Closure to protect GitHub token from global scope
        var _githubToken = '';

        function getGitHubToken() {
            return _githubToken;
        }

        function setGitHubToken(tok) {
            _githubToken = tok;
        }

        async function sha256(message) {
            var msgBuffer = new TextEncoder().encode(message);
            var hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            var hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(function(b) {
                return b.toString(16).padStart(2, '0');
            }).join('');
        }

        var CATEGORIES = ['landscapes', 'wildlife', 'portraits'];
        var photos = {
            landscapes: [],
            wildlife: [],
            portraits: []
        };
        var featuredPhotos = [];
        var activeFilter = 'all';
        var activeUploadFolder = 'landscapes';
        var lbIndex = 0;
        var lbPhotos = [];
        var isAdmin = false;
        var holdTimer = null;
        var carouselIndex = 0;
        var carouselTimer = null;

        // ---- GitHub helpers ----
        function ghFetch(path, opts) {
            var headers = {
                'Content-Type': 'application/json'
            };
            var tok = getGitHubToken();
            if (tok) headers['Authorization'] = 'token ' + tok;
            return fetch('https://api.github.com/repos/' + GITHUB_USER + '/' + GITHUB_REPO + '/' + path, Object.assign({
                headers: headers
            }, opts));
        }

        function loadFolder(folder, callback) {
            ghFetch('contents/images/' + folder)
                .then(function(r) {
                    return r.json();
                })
                .then(function(files) {
                    if (!Array.isArray(files)) {
                        callback([]);
                        return;
                    }
                    callback(files.filter(function(f) {
                            return /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name);
                        })
                        .map(function(f) {
                            return {
                                name: f.name,
                                url: f.download_url,
                                folder: folder
                            };
                        }));
                }).catch(function() {
                    callback([]);
                });
        }

        function loadAll() {
            // Try local manifest first for instant loading
            fetch('images.json')
                .then(function(r) {
                    return r.json();
                })
                .then(function(data) {
                    if (data.landscapes) photos.landscapes = data.landscapes;
                    if (data.wildlife) photos.wildlife = data.wildlife;
                    if (data.portraits) photos.portraits = data.portraits;
                    if (data.featured) {
                        featuredPhotos = data.featured;
                        initCarousel();
                    }
                    renderGallery();
                }).catch(function() {
                    // Silent fail — will try GitHub API below
                })
                .finally(function() {
                    // Always refresh from GitHub API in case there are newer images
                    CATEGORIES.forEach(function(cat) {
                        loadFolder(cat, function(imgs) {
                            if (imgs.length) {
                                photos[cat] = imgs;
                                renderGallery();
                            }
                        });
                    });
                    loadFolder('featured', function(imgs) {
                        if (imgs.length) {
                            featuredPhotos = imgs;
                            initCarousel();
                        }
                    });
                });
        }

        function uploadToGitHub(file, base64, folder) {
            var status = document.getElementById('uploadStatus');
            status.className = 'upload-status';
            status.textContent = 'Uploading ' + file.name + '…';
            var path = 'images/' + folder + '/' + file.name;
            // First, check if file exists to get SHA
            ghFetch('contents/' + path)
                .then(function(r) {
                    if (r.ok) {
                        return r.json();
                    } else if (r.status === 404) {
                        // File doesn't exist, no SHA needed
                        return null;
                    } else {
                        throw new Error('Failed to check file existence');
                    }
                })
                .then(function(existingFile) {
                    var body = {
                        message: 'Add ' + folder + '/' + file.name,
                        content: base64.split(',')[1]
                    };
                    if (existingFile && existingFile.sha) {
                        body.sha = existingFile.sha;
                    }
                    return ghFetch('contents/' + path, {
                        method: 'PUT',
                        body: JSON.stringify(body)
                    });
                })
                .then(function(r) {
                    return r.json();
                })
                .then(function(data) {
                    if (data.content) {
                        var photo = {
                            name: file.name,
                            url: data.content.download_url,
                            folder: folder
                        };
                        if (folder === 'featured') {
                            featuredPhotos.push(photo);
                            initCarousel();
                        } else {
                            photos[folder].push(photo);
                            renderGallery();
                        }
                        status.className = 'upload-status ok';
                        status.textContent = file.name + ' uploaded to ' + folder + '.';
                    } else {
                        status.className = 'upload-status fail';
                        status.textContent = 'Failed: ' + (data.message || 'unknown error');
                    }
                }).catch(function(e) {
                    status.className = 'upload-status fail';
                    status.textContent = 'Error: ' + e.message;
                });
        }

        function deleteFromGitHub(name, folder) {
            ghFetch('contents/images/' + folder + '/' + name)
                .then(function(r) {
                    return r.json();
                })
                .then(function(data) {
                    return ghFetch('contents/images/' + folder + '/' + name, {
                        method: 'DELETE',
                        body: JSON.stringify({
                            message: 'Remove ' + folder + '/' + name,
                            sha: data.sha
                        })
                    });
                }).then(function() {
                    if (folder === 'featured') {
                        featuredPhotos = featuredPhotos.filter(function(p) {
                            return p.name !== name;
                        });
                        initCarousel();
                    } else {
                        photos[folder] = photos[folder].filter(function(p) {
                            return p.name !== name;
                        });
                        renderGallery();
                    }
                }).catch(function(e) {
                    alert('Delete failed: ' + e.message);
                });
        }

        // ---- Carousel ----
        function initCarousel() {
            var c = document.getElementById('featuredCarousel');
            var dots = document.getElementById('carouselDots');
            c.innerHTML = '';
            dots.innerHTML = '';
            if (!featuredPhotos.length) return;
            featuredPhotos.forEach(function(p, i) {
                var slide = document.createElement('div');
                slide.className = 'carousel-slide' + (i === 0 ? ' active' : '');
                slide.style.backgroundImage = 'url(' + p.url + ')';
                c.appendChild(slide);
                var dot = document.createElement('button');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.addEventListener('click', function() {
                    goToSlide(i);
                });
                dots.appendChild(dot);
            });
            clearInterval(carouselTimer);
            carouselTimer = setInterval(function() {
                goToSlide((carouselIndex + 1) % featuredPhotos.length);
            }, 5000);
        }

        function goToSlide(i) {
            var slides = document.querySelectorAll('.carousel-slide');
            var dots = document.querySelectorAll('.carousel-dot');
            if (!slides.length) return;
            slides[carouselIndex].classList.remove('active');
            dots[carouselIndex].classList.remove('active');
            carouselIndex = i;
            slides[i].classList.add('active');
            dots[i].classList.add('active');
        }

        // ---- Filter ----
        document.querySelectorAll('.filter-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(function(b) {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
                activeFilter = btn.dataset.cat;
                renderGallery();
            });
        });

        // ---- Admin folder selector ----
        document.querySelectorAll('.folder-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.folder-btn').forEach(function(b) {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
                activeUploadFolder = btn.dataset.folder;
                var label = btn.textContent.replace(/^.\s/, '');
                document.getElementById('uploadZoneLabel').innerHTML = 'Uploading to <span>' + label + '</span>';
            });
        });

        // ---- Upload ----
        var zone = document.getElementById('uploadZone');
        var fileInput = document.getElementById('fileInput');
        zone.addEventListener('click', function() {
            fileInput.click();
        });
        zone.addEventListener('dragover', function(e) {
            e.preventDefault();
            zone.classList.add('drag-over');
        });
        zone.addEventListener('dragleave', function() {
            zone.classList.remove('drag-over');
        });
        zone.addEventListener('drop', function(e) {
            e.preventDefault();
            zone.classList.remove('drag-over');
            handleFiles(Array.from(e.dataTransfer.files));
        });
        fileInput.addEventListener('change', function() {
            handleFiles(Array.from(fileInput.files));
            fileInput.value = '';
        });

        function handleFiles(files) {
            var folder = activeUploadFolder;
            files.filter(function(f) {
                return f.type.startsWith('image/');
            }).forEach(function(f) {
                var r = new FileReader();
                r.onload = function(e) {
                    uploadToGitHub(f, e.target.result, folder);
                };
                r.readAsDataURL(f);
            });
        }

        // ---- Render Gallery ----
        function getVisible() {
            if (activeFilter === 'all') {
                return CATEGORIES.reduce(function(acc, cat) {
                    return acc.concat(photos[cat]);
                }, []);
            }
            return photos[activeFilter] || [];
        }

        function renderGallery() {
            var masonry = document.getElementById('masonry');
            masonry.innerHTML = '';
            var visible = getVisible();
            if (!visible.length) {
                var el = document.createElement('div');
                el.className = 'empty-state';
                el.textContent = isAdmin ? 'Upload photos using the panel above.' : 'No photos yet.';
                masonry.appendChild(el);
                return;
            }
            lbPhotos = visible;
            visible.forEach(function(p, i) {
                var card = document.createElement('div');
                card.className = 'photo-card';
                var actions = '<button class="card-btn" data-view="' + i + '">View</button>';
                if (isAdmin) actions += '<button class="card-btn danger" data-del="' + p.name + '" data-folder="' + p.folder + '">Remove</button>';
                card.innerHTML = '<img src="' + p.url + '" alt="' + p.name + '" draggable="false"><div class="photo-overlay"><div class="card-actions">' + actions + '</div></div>';
                masonry.appendChild(card);
            });
            masonry.querySelectorAll('[data-view]').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    openLightbox(+btn.dataset.view);
                });
            });
            masonry.querySelectorAll('.photo-card').forEach(function(card, i) {
                card.addEventListener('click', function() {
                    openLightbox(i);
                });
            });
            masonry.querySelectorAll('[data-del]').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (confirm('Remove ' + btn.dataset.del + '?')) deleteFromGitHub(btn.dataset.del, btn.dataset.folder);
                });
            });
        }

        // ---- Lightbox ----
        function openLightbox(i) {
            lbIndex = i;
            updateLightbox();
            document.getElementById('lightbox').classList.add('open');
        }

        function updateLightbox() {
            var p = lbPhotos[lbIndex];
            document.getElementById('lbImg').src = p.url;
            document.getElementById('lbCaption').textContent = p.folder + ' · ' + p.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
        }
        document.getElementById('lbClose').addEventListener('click', function() {
            document.getElementById('lightbox').classList.remove('open');
        });
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open');
        });
        document.getElementById('lb-prev').addEventListener('click', function(e) {
            e.stopPropagation();
            lbIndex = (lbIndex - 1 + lbPhotos.length) % lbPhotos.length;
            updateLightbox();
        });
        document.getElementById('lb-next').addEventListener('click', function(e) {
            e.stopPropagation();
            lbIndex = (lbIndex + 1) % lbPhotos.length;
            updateLightbox();
        });

        // ---- Admin trigger: hold R 2s ----
        document.addEventListener('keydown', function(e) {
            if (e.repeat || (e.key !== 'r' && e.key !== 'R')) return;
            if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
            holdTimer = setTimeout(function() {
                if (isAdmin) {
                    isAdmin = false;
                    document.getElementById('adminPanel').style.display = 'none';
                    renderGallery();
                } else {
                    document.getElementById('adminBox').style.display = 'block';
                    document.getElementById('adminPwInput').value = '';
                    document.getElementById('adminTokenInput').value = '';
                    document.getElementById('adminPwErr').style.display = 'none';
                    document.getElementById('adminPwInput').focus();
                }
            }, 2000);
        });
        document.addEventListener('keyup', function(e) {
            if (e.key === 'r' || e.key === 'R') {
                clearTimeout(holdTimer);
                holdTimer = null;
            }
        });

        async function tryLogin() {
            var pw = document.getElementById('adminPwInput').value;
            var tok = document.getElementById('adminTokenInput').value.trim();
            var hash = await sha256(pw);
            if (hash === ADMIN_PASS_HASH && tok) {
                setGitHubToken(tok);
                document.getElementById('adminBox').style.display = 'none';
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                renderGallery();
            } else {
                var err = document.getElementById('adminPwErr');
                err.style.display = 'block';
                err.textContent = hash !== ADMIN_PASS_HASH ? 'Incorrect password' : 'GitHub token required';
            }
        }
        document.getElementById('adminPwBtn').addEventListener('click', tryLogin);
        document.getElementById('adminPwInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') tryLogin();
            if (e.key === 'Escape') document.getElementById('adminBox').style.display = 'none';
        });
        document.getElementById('adminTokenInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') tryLogin();
        });

        // ---- Contact form handler ----
        var contactForm = document.getElementById('contactForm');
        if (contactForm) {
            contactForm.addEventListener('submit', function(e) {
                e.preventDefault();
                var status = document.getElementById('formStatus');
                status.className = 'upload-status';
                status.textContent = 'Sending…';
                var data = new FormData(contactForm);
                fetch(contactForm.action, {
                    method: 'POST',
                    body: data,
                    headers: {
                        'Accept': 'application/json'
                    }
                }).then(function(r) {
                    if (r.ok) {
                        status.className = 'upload-status ok';
                        status.textContent = 'Message sent successfully.';
                        contactForm.reset();
                    } else {
                        status.className = 'upload-status fail';
                        status.textContent = 'Failed to send. Please try again.';
                    }
                }).catch(function() {
                    status.className = 'upload-status fail';
                    status.textContent = 'Failed to send. Please try again.';
                });
            });
        }

        document.addEventListener('keydown', function(e) {
            var lb = document.getElementById('lightbox');
            if (!lb.classList.contains('open')) return;
            if (e.key === 'Escape') lb.classList.remove('open');
            if (e.key === 'ArrowLeft') {
                lbIndex = (lbIndex - 1 + lbPhotos.length) % lbPhotos.length;
                updateLightbox();
            }
            if (e.key === 'ArrowRight') {
                lbIndex = (lbIndex + 1) % lbPhotos.length;
                updateLightbox();
            }
        });

        // ---- Right-click protection on images ----
        document.addEventListener('contextmenu', function(e) {
            if (e.target.tagName === 'IMG') {
                e.preventDefault();
            }
        });

        loadAll();
    </script>
</body>

</html>
